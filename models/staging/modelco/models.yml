version: 2

models:

  - name: stg_modelco__customer
    description: Staged customer records from the operations source.
    columns:
      - name: customer_id
        description: Natural key identifying the customer.
        tests:
          - not_null
          - unique

  - name: stg_modelco__sales_order
    description: Staged sales order records from the operations source.
    columns:
      - name: sales_order_id
        description: Natural key identifying the sales order.
        tests:
          - not_null
          - unique

  - name: stg_modelco__part
    description: Staged part records from the operations source.
    columns:
      - name: part_id
        description: Natural key identifying the part.
        tests:
          - not_null
          - unique

  - name: stg_modelco__location
    description: Staged location (nation) records from the operations source.
    columns:
      - name: location_id
        description: Natural key identifying the location.
        tests:
          - not_null
          - unique

  - name: stg_modelco__supplier
    description: Staged supplier records from the operations source.
    columns:
      - name: supplier_id
        description: Natural key identifying the supplier.
        tests:
          - not_null
          - unique

  - name: stg_modelco__inventory
    description: Staged inventory records from the operations source.
    columns:
      - name: part_id
        description: Part of composite primary key.
        tests:
          - not_null
      - name: supplier_id
        description: Part of composite primary key.
        tests:
          - not_null

  - name: stg_modelco__lineitem
    description: Staged line item records from the operations source.
    columns:
      - name: line_number
        description: Part of composite primary key.
        tests:
          - not_null
      - name: sales_order_id
        description: Part of composite primary key.
        tests:
          - not_null
