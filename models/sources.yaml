version: 2

sources:
  - name: sample_data
    database: snowflake_sample_data
    schema: tpch_sf1
    tables:
      - name: orders
      - name: customer
      - name: nation


  - name: operations
    database: demo_tpch
    schema: operations_raw
    config:
      loaded_at_field: load_dts
      freshness:
        warn_after:
          count: 1
          period: day
        error_after:
          count: 7
          period: day
    tables:
      - name: part
      - name: location
      - name: supplier
      - name: customer
      - name: sales_order
      - name: inventory
      - name: lineitem
